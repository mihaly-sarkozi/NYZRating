# Production profil — infra csak belső Docker hálózaton, pinelt image-ek, kötelező titkok.
# Használat: cp .env.production.example .env && docker compose -f docker-compose.prod.yml up -d
name: aiplaza-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: aiplaza-prod-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: aiplaza-prod-qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY required}
    volumes:
      - prod_qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - internal

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: aiplaza-prod-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    command: server /data --console-address ":9001"
    volumes:
      - prod_minio_data:/data
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: aiplaza-prod-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD required}"]
    volumes:
      - prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: docker/backend.prod.Dockerfile
    container_name: aiplaza-prod-backend
    env_file:
      - .env
    environment:
      APP_ENV: production
      INSTANCE_ROLE: web
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      database_url: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      redis_url: redis://:${REDIS_PASSWORD}@redis:6379/0
      BILLING_PROVIDER: manual
      BILLING_MODE: manual
    ports:
      - "127.0.0.1:8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/api/health/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - internal

  backend-worker:
    build:
      context: .
      dockerfile: docker/backend.prod.Dockerfile
    container_name: aiplaza-prod-worker
    env_file:
      - .env
    environment:
      APP_ENV: production
      INSTANCE_ROLE: worker
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      database_url: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      redis_url: redis://:${REDIS_PASSWORD}@redis:6379/0
    command: sh -c "python3 -m core.kernel.events"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.prod.Dockerfile
    container_name: aiplaza-prod-frontend
    environment:
      VITE_TENANT_DOMAIN: ${TENANT_BASE_DOMAIN:?TENANT_BASE_DOMAIN required}
      VITE_API_URL: ${VITE_API_URL:?VITE_API_URL required}
    ports:
      - "127.0.0.1:4173:4173"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  prod_postgres_data:
  prod_qdrant_data:
  prod_minio_data:
  prod_redis_data:
