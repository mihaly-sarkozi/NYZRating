name: nyzrating

services:
  postgres:
    image: postgres:16-alpine
    container_name: nyzrating-postgres
    environment:
      POSTGRES_DB: nyzrating
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nyzrating"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nyzrating-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: nyzrating-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: nyzrating-backend
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file:
      - .env
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+psycopg2://postgres@postgres:5432/nyzrating
      database_url: postgresql+psycopg2://postgres@postgres:5432/nyzrating
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      FRONTEND_BASE_URL: http://lvh.me:5173
      FRONTEND_SET_PASSWORD_PORT: 5173
      SMTP_FROM_EMAIL: sarkozi.mihaly@gmail.com
      SMTP_FROM_NAME: sarkozi.mihaly@gmail.com
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://lvh.me:5173
      CORS_ORIGINS_REGEX: https?://.*\.lvh\.me(:\d+)?
      TENANT_BASE_DOMAIN: lvh.me
      INSTALL_HOST: lvh.me
      TRUSTED_HOSTS: localhost,127.0.0.1,lvh.me,*.lvh.me
      BILLING_PROVIDER: simulated
    command: sh -c "python3 scripts/init_db.py && uvicorn main:app --reload --host 0.0.0.0 --port 8001"
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; req=urllib.request.Request('http://127.0.0.1:8001/api/health/ready', headers={'Host':'lvh.me'}); urllib.request.urlopen(req, timeout=5).read()\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: nyzrating-frontend
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      CI: "true"
      VITE_DEV_PROXY_TARGET: http://host.docker.internal:8001
      VITE_TENANT_DOMAIN: lvh.me
      VITE_API_URL: /api
      CHOKIDAR_USEPOLLING: "true"
      BASELINE_BROWSER_MAPPING_IGNORE_OLD_DATA: "true"
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0 --port 5173"
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
      - ./backend/apps:/app/backend/apps
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  frontend_node_modules:
