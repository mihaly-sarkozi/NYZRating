[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
pythonpath = .
norecursedirs =
    .git
    .venv
    venv
    env
    ENV
    node_modules
    frontend/node_modules
    __pycache__
    .pytest_cache
    .ruff_cache
    .mypy_cache
    dist
    build
    htmlcov
    .cursor
    .pnpm-store
    .idea
    .vscode
    .turbo
    .next
    out
addopts = -ra --strict-markers
# Harmadik féltől: passlib Python 3.13 crypt deprecation; requests urllib3 verzió-ellenőrzés zaj
filterwarnings =
    ignore::DeprecationWarning:passlib.*
    ignore:.*urllib3.*doesn't match.*:Warning:requests
    ignore:.*asyncio\.iscoroutinefunction.*:DeprecationWarning:slowapi\.
    ignore:ast.NameConstant is deprecated and will be removed in Python 3\.14; use ast\.Constant instead:DeprecationWarning:reportlab\.
markers =
    architecture: AST-alapú architektúra és dependency boundary tesztek
    unit: gyors, külső függőség nélküli tesztek (tests/unit; ne kérjen app/DB fixture-t)
    integration: API, TestClient, valós DB vagy teljes app összeállítás
    security: kritikus biztonsági invariánsok és regressziós tesztek
    slow: lassú tesztek (pl. NER modellek)
    must_pass: valódi viselkedés teszt (sikeresen kell lefutnia)
    expected_fail_not_implemented: funkció még nincs implementálva (xfail)
    smoke_only: csak triviális ellenőrzés (pl. „lista visszatérés”)
    release_acceptance: minimum release acceptance suite – minden ilyen tesztnek át kell mennie a ship előtt
